AWSTemplateFormatVersion: '2010-09-09'
Description: 'Authenticated distribution landing page with ALB + Lambda + OIDC + S3'

Parameters:
  IdentityPoolName:
    Type: String
    Description: Name prefix for resources (from identity pool name)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for ALB and Lambda

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for ALB (minimum 2 AZs)

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnets for Lambda (minimum 2 AZs)

  IdPProvider:
    Type: String
    AllowedValues: [okta, azure, auth0, cognito]
    Description: Identity provider type

  # Okta parameters
  OktaDomain:
    Type: String
    Default: ''
    Description: Okta domain (e.g., company.okta.com)

  OktaClientId:
    Type: String
    Default: ''
    Description: Okta web application client ID

  OktaClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Okta client secret

  # Azure AD parameters
  AzureTenantId:
    Type: String
    Default: ''
    Description: Azure AD tenant ID

  AzureClientId:
    Type: String
    Default: ''
    Description: Azure AD web application client ID

  AzureClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Azure client secret

  # Auth0 parameters
  Auth0Domain:
    Type: String
    Default: ''
    Description: Auth0 domain (e.g., company.auth0.com)

  Auth0ClientId:
    Type: String
    Default: ''
    Description: Auth0 web application client ID

  Auth0ClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Auth0 client secret

  # Cognito parameters
  CognitoUserPoolId:
    Type: String
    Default: ''
    Description: Cognito User Pool ID

  CognitoUserPoolDomain:
    Type: String
    Default: ''
    Description: Cognito User Pool domain prefix

  CognitoClientId:
    Type: String
    Default: ''
    Description: Cognito web application client ID

  CognitoClientSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager ARN for Cognito client secret

  # REQUIRED: Custom domain for HTTPS/OIDC authentication
  CustomDomainName:
    Type: String
    Description: 'REQUIRED: Custom domain for landing page (e.g., downloads.example.com). ACM certificate must exist.'
    AllowedPattern: '.+'
    ConstraintDescription: 'Custom domain is required for authenticated landing page.'

  HostedZoneId:
    Type: String
    Default: ''
    Description: '(Optional) Route53 hosted zone ID for automatic DNS configuration.'

  DeploymentTimestamp:
    Type: String
    Default: 'initial'
    Description: Timestamp to force custom resource re-execution on every deployment (auto-populated by deploy command)

  # Admin panel parameters
  EnableAdminPanel:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Enable admin quota management panel on the landing page

  AdminEmails:
    Type: String
    Default: ''
    Description: Comma-separated list of admin email addresses for quota management panel

  AdminGroupName:
    Type: String
    Default: ''
    Description: IdP group name that grants admin access to quota management panel

  QuotaPoliciesTableName:
    Type: String
    Default: ''
    Description: Name of the QuotaPolicies DynamoDB table (from quota monitoring stack)

  QuotaPoliciesTableArn:
    Type: String
    Default: ''
    Description: ARN of the QuotaPolicies DynamoDB table

  UserQuotaMetricsTableName:
    Type: String
    Default: ''
    Description: Name of the UserQuotaMetrics DynamoDB table (from quota monitoring stack)

  UserQuotaMetricsTableArn:
    Type: String
    Default: ''
    Description: ARN of the UserQuotaMetrics DynamoDB table

  BedrockPricingTableName:
    Type: String
    Default: ''
    Description: Name of the BedrockPricing DynamoDB table (from quota monitoring stack)

  BedrockPricingTableArn:
    Type: String
    Default: ''
    Description: ARN of the BedrockPricing DynamoDB table

Conditions:
  IsOkta: !Equals [!Ref IdPProvider, 'okta']
  IsAzure: !Equals [!Ref IdPProvider, 'azure']
  IsAuth0: !Equals [!Ref IdPProvider, 'auth0']
  IsCognito: !Equals [!Ref IdPProvider, 'cognito']
  HasRoute53Zone: !Not [!Equals [!Ref HostedZoneId, '']]
  HasAdminPanel: !Equals [!Ref EnableAdminPanel, 'true']

Resources:
  # S3 Bucket for package distribution
  DistributionBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${IdentityPoolName}-landing-page-dist-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: LandingPageDistribution

  # S3 Bucket for ALB access logs
  ALBLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${IdentityPoolName}-alb-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: ALBAccessLogs

  # ALB Logs Bucket Policy
  ALBLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ALBLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSLogDeliveryWrite
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::127311923021:root'  # ELB service account for us-east-1
            Action: s3:PutObject
            Resource: !Sub '${ALBLogsBucket.Arn}/*'
          - Sid: AWSLogDeliveryAclCheck
            Effect: Allow
            Principal:
              Service: logdelivery.elasticloadbalancing.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ALBLogsBucket.Arn

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:HeadObject
                Resource:
                  - !GetAtt DistributionBucket.Arn
                  - !Sub '${DistributionBucket.Arn}/*'
        - !If
          - HasAdminPanel
          - PolicyName: AdminCheckAccess
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:Scan
                  Resource: !Ref QuotaPoliciesTableArn
          - !Ref AWS::NoValue
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Lambda CloudWatch Log Group with retention policy
  LandingPageLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${IdentityPoolName}-landing-page'
      RetentionInDays: 30

  # Lambda Function for landing page
  LandingPageFunction:
    Type: AWS::Lambda::Function
    DependsOn: LandingPageLogGroup
    Properties:
      FunctionName: !Sub '${IdentityPoolName}-landing-page'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          S3_BUCKET_NAME: !Ref DistributionBucket
          ENABLE_ADMIN_PANEL: !If [HasAdminPanel, 'true', 'false']
          ADMIN_EMAILS: !If [HasAdminPanel, !Ref AdminEmails, '']
          ADMIN_GROUP_NAME: !If [HasAdminPanel, !Ref AdminGroupName, '']
          QUOTA_POLICIES_TABLE: !If [HasAdminPanel, !Ref QuotaPoliciesTableName, '']
          CCWB_PROFILE_NAME: !Ref IdentityPoolName
          COGNITO_DOMAIN: !Sub '${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com'
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          CUSTOM_DOMAIN: !Ref CustomDomainName
      Code:
        ZipFile: |
          # ABOUTME: Lambda function for authenticated distribution landing page
          # ABOUTME: Generates presigned download URLs for authenticated users

          import os
          import json
          import base64
          import boto3
          from datetime import datetime, timedelta

          s3_client = boto3.client('s3')
          BUCKET_NAME = os.environ['S3_BUCKET_NAME']
          PRESIGNED_URL_EXPIRY = 3600  # 1 hour

          # Per-bundle S3 keys. One key per platform + variant. Portable bundles
          # are self-contained (~35-130 MB); slim bundles (~29 MB) reuse the
          # user's system Python 3.9+ and only exist for Linux.
          PLATFORM_KEYS = [
              'windows',
              'macos-arm64', 'macos-intel',
              'linux-x64-slim', 'linux-arm64-slim',
              'linux-x64', 'linux-arm64',
          ]

          def lambda_handler(event, context):
              """Handle authenticated requests from ALB and generate landing page"""
              import uuid

              try:
                  # Check if this is a documentation request
                  path = event.get('path', '/')
                  if path == '/logout':
                      # Clear all ALB OIDC session cookies (ALB may use -0 through -4)
                      # Then redirect to Cognito logout endpoint to terminate IdP session
                      expired = 'Expires=Thu, 01 Jan 1970 00:00:00 GMT; Path=/; HttpOnly; Secure'
                      cognito_domain = os.environ.get('COGNITO_DOMAIN', '')
                      cognito_client_id = os.environ.get('COGNITO_CLIENT_ID', '')
                      custom_domain = os.environ.get('CUSTOM_DOMAIN', '')
                      if cognito_domain and cognito_client_id and custom_domain:
                          logout_uri = f'https://{custom_domain}/'
                          cognito_logout_url = f'https://{cognito_domain}/logout?client_id={cognito_client_id}&logout_uri={logout_uri}'
                          redirect_location = cognito_logout_url
                      else:
                          redirect_location = '/'
                      return {
                          'statusCode': 302,
                          'multiValueHeaders': {
                              'Location': [redirect_location],
                              'Set-Cookie': [
                                  f'AWSELBAuthSessionCookie-0=; {expired}',
                                  f'AWSELBAuthSessionCookie-1=; {expired}',
                                  f'AWSELBAuthSessionCookie-2=; {expired}',
                                  f'AWSELBAuthSessionCookie-3=; {expired}',
                                  f'AWSELBAuthSessionCookie-4=; {expired}',
                              ]
                          },
                          'body': ''
                      }
                  if path.startswith('/docs'):
                      return serve_documentation(path)

                  # Extract user email from ALB authentication headers
                  # ALB has already validated authentication - trust the header
                  user_email = extract_user_email(event)

                  # Detect user's OS from User-Agent
                  detected_os = detect_os(event)

                  # List packages in S3
                  packages = list_packages()

                  # Generate presigned URLs for each package
                  download_urls = {}
                  for platform in PLATFORM_KEYS:
                      if platform in packages:
                          download_urls[platform] = generate_presigned_url(
                              f"packages/{platform}/latest.zip"
                          )

                  # Get metadata from the first available package. Preference
                  # order matches what most users land on (windows > mac > linux).
                  metadata_source = (
                      packages.get('windows')
                      or packages.get('macos-arm64') or packages.get('macos-intel')
                      or packages.get('linux-x64-slim') or packages.get('linux-arm64-slim')
                      or packages.get('linux-x64') or packages.get('linux-arm64')
                      or {}
                  )
                  profile = metadata_source.get('profile', 'Unknown')
                  timestamp = metadata_source.get('timestamp', 'Unknown')
                  release_datetime = metadata_source.get('release_datetime', 'Unknown')

                  # Check if user is an admin — DynamoDB is source of truth, seed list is fallback
                  is_admin = check_is_admin(user_email)

                  # Generate HTML page with OS detection
                  aws_profile = os.environ.get('CCWB_PROFILE_NAME', 'claude-bedrock-ccwb')
                  html = generate_landing_page(user_email, download_urls, profile, timestamp, release_datetime, packages, detected_os, is_admin, aws_profile)

                  return {
                      'statusCode': 200,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': html
                  }

              except Exception as e:
                  import traceback
                  error_id = str(uuid.uuid4())

                  # Log full error details to CloudWatch only
                  error_details = traceback.format_exc()
                  print(f"ERROR_ID={error_id}: {error_details}")

                  # Return generic error to user (no sensitive details)
                  return {
                      'statusCode': 500,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': f'<html><body><h1>Error</h1><p>An error occurred while generating the landing page.</p><p>Error ID: {error_id}</p><p>Please contact your IT administrator with this error ID.</p></body></html>'
                  }

          def get_header(event, name):
              """Get a header value from either headers or multiValueHeaders (ALB multi-value mode)."""
              # multiValueHeaders takes precedence when lambda.multi_value_headers.enabled=true
              mvh = event.get('multiValueHeaders', {})
              if mvh:
                  val = mvh.get(name) or mvh.get(name.lower())
                  if val:
                      return val[0]
              h = event.get('headers', {})
              return (h.get(name) or h.get(name.lower()) or '')

          def extract_user_email(event):
              """Extract user email from ALB OIDC headers - ALB has already validated authentication"""
              # Priority 1: Extract email from ALB-verified JWT payload
              # ALB has validated the JWT signature, so we can safely decode the payload
              oidc_data = get_header(event, 'x-amzn-oidc-data')
              if oidc_data:
                  try:
                      parts = oidc_data.split('.')
                      if len(parts) == 3:
                          payload_b64 = parts[1]
                          padding = 4 - len(payload_b64) % 4
                          if padding != 4:
                              payload_b64 += '=' * padding
                          payload = json.loads(base64.b64decode(payload_b64))
                          email = payload.get('email') or payload.get('preferred_username') or payload.get('upn')
                          if email:
                              return email
                  except Exception:
                      pass

              # Priority 2: Fallback to x-amzn-oidc-identity header (may be Cognito sub UUID)
              user_identity = get_header(event, 'x-amzn-oidc-identity')
              if user_identity:
                  return user_identity

              # Default fallback for non-authenticated requests
              return 'authenticated-user@example.com'

          def check_is_admin(user_email):
              """Check admin status: DynamoDB is source of truth, seed list is fallback."""
              email = user_email.lower()
              table_name = os.environ.get('QUOTA_POLICIES_TABLE', '')
              if table_name:
                  try:
                      ddb = boto3.resource('dynamodb')
                      table = ddb.Table(table_name)
                      resp = table.get_item(Key={'pk': f'ADMIN#{email}', 'sk': 'ADMIN'})
                      if resp.get('Item'):
                          return True
                  except Exception as e:
                      print(f"DynamoDB admin check failed, falling back to env var: {e}")
              # Fallback: seed list from env var
              seed_admins = [e.strip().lower() for e in os.environ.get('ADMIN_EMAILS', '').split(',') if e.strip()]
              return email in seed_admins

          def detect_os(event):
              """Detect user's operating system from User-Agent header"""
              user_agent = get_header(event, 'user-agent').lower()

              # Check for macOS
              if 'mac' in user_agent or 'darwin' in user_agent:
                  return 'mac'
              # Check for Windows
              elif 'windows' in user_agent or 'win64' in user_agent or 'win32' in user_agent:
                  return 'windows'
              # Check for Linux
              elif 'linux' in user_agent and 'android' not in user_agent:
                  return 'linux'
              # Default to all-platforms if unknown
              else:
                  return None

          def list_packages():
              """List available packages in S3 with metadata"""
              packages = {}

              for platform in PLATFORM_KEYS:
                  try:
                      response = s3_client.head_object(
                          Bucket=BUCKET_NAME,
                          Key=f"packages/{platform}/latest.zip"
                      )
                      metadata = response.get('Metadata', {})
                      packages[platform] = {
                          'size': response['ContentLength'],
                          'profile': metadata.get('profile', 'Unknown'),
                          'timestamp': metadata.get('timestamp', 'Unknown'),
                          'release_date': metadata.get('release_date', metadata.get('release-date', 'Unknown')),
                          'release_datetime': metadata.get('release_datetime', metadata.get('release-date', 'Unknown')),
                      }
                  except s3_client.exceptions.ClientError as e:
                      if e.response['Error']['Code'] != '404':
                          print(f"Error checking {platform}: {e}")

              return packages

          def generate_presigned_url(s3_key):
              """Generate presigned URL for S3 object"""
              try:
                  return s3_client.generate_presigned_url(
                      'get_object',
                      Params={'Bucket': BUCKET_NAME, 'Key': s3_key},
                      ExpiresIn=PRESIGNED_URL_EXPIRY
                  )
              except Exception as e:
                  print(f"Error generating presigned URL for {s3_key}: {e}")
                  return '#'

          def serve_documentation(path):
              """Serve documentation HTML from S3 docs/ prefix"""
              # Remove leading /docs/ from path properly
              if path.startswith('/docs/'):
                  doc_path = path[6:]  # Remove '/docs/'
              elif path.startswith('/docs'):
                  doc_path = path[5:]  # Remove '/docs'
              else:
                  doc_path = path.lstrip('/')

              # Default to index.html if no path specified
              if not doc_path or doc_path == '':
                  doc_path = 'index.html'

              # Construct S3 key
              s3_key = f"docs/{doc_path}"

              try:
                  response = s3_client.get_object(Bucket=BUCKET_NAME, Key=s3_key)
                  content = response['Body'].read()

                  # Determine content type based on file extension
                  content_type = 'text/html; charset=utf-8'
                  if doc_path.endswith('.css'):
                      content_type = 'text/css'
                  elif doc_path.endswith('.js'):
                      content_type = 'application/javascript'
                  elif doc_path.endswith('.png'):
                      content_type = 'image/png'
                  elif doc_path.endswith('.jpg') or doc_path.endswith('.jpeg'):
                      content_type = 'image/jpeg'
                  elif doc_path.endswith('.svg'):
                      content_type = 'image/svg+xml'
                  elif doc_path.endswith('.zip'):
                      content_type = 'application/zip'

                  # Binary files need base64 encoding
                  is_binary = content_type in ['application/zip', 'image/png', 'image/jpeg', 'image/svg+xml']

                  return {
                      'statusCode': 200,
                      'multiValueHeaders': {'Content-Type': [content_type]},
                      'body': base64.b64encode(content).decode('utf-8') if is_binary else content.decode('utf-8'),
                      'isBase64Encoded': is_binary
                  }
              except s3_client.exceptions.NoSuchKey:
                  print(f"Documentation not found: {doc_path}")
                  return {
                      'statusCode': 404,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': '<html><body><h1>404 - Documentation Not Found</h1><p>The requested documentation page does not exist.</p></body></html>'
                  }
              except Exception as e:
                  import traceback
                  import uuid
                  error_id = str(uuid.uuid4())
                  # Log full error to CloudWatch only
                  print(f"ERROR_ID={error_id}: Error serving documentation - {traceback.format_exc()}")
                  # Return generic error to user
                  return {
                      'statusCode': 500,
                      'multiValueHeaders': {'Content-Type': ['text/html; charset=utf-8']},
                      'body': f'<html><body><h1>Error</h1><p>Error loading documentation.</p><p>Error ID: {error_id}</p></body></html>'
                  }

          def format_size(size_bytes):
              """Format bytes to human-readable size"""
              if size_bytes < 1024:
                  return f"{size_bytes} B"
              elif size_bytes < 1024 * 1024:
                  return f"{size_bytes / 1024:.1f} KB"
              elif size_bytes < 1024 * 1024 * 1024:
                  return f"{size_bytes / (1024 * 1024):.1f} MB"
              else:
                  return f"{size_bytes / (1024 * 1024 * 1024):.2f} GB"

          def generate_landing_page(user_email, download_urls, profile, timestamp, release_datetime, packages, detected_os=None, is_admin=False, aws_profile=''):
              """Generate HTML landing page with OS detection"""

              # Format release datetime
              formatted_datetime = release_datetime
              if release_datetime != 'Unknown':
                  try:
                      dt = datetime.strptime(release_datetime, '%Y-%m-%d %H:%M:%S')
                      formatted_datetime = dt.strftime('%B %d, %Y at %I:%M %p')
                  except:
                      # If parsing fails, use as-is
                      pass

              # Format timestamp for display
              formatted_timestamp = timestamp
              if timestamp != 'Unknown':
                  try:
                      # Parse timestamp: YYYY-MM-DD-HHMMSS
                      dt = datetime.strptime(timestamp, '%Y-%m-%d-%H%M%S')
                      formatted_timestamp = dt.strftime('%Y-%m-%d %H:%M:%S')
                  except:
                      # If parsing fails, use as-is
                      pass

              # Platform metadata. One entry per S3 key in PLATFORM_KEYS.
              # Icons: shared Windows / macOS / Linux SVGs. Slim vs portable
              # variants disambiguate via the `variant_tag` pill in the card
              # header (no new icon needed).
              win_icon   = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.6L10.5 4.5V11.5H3V5.6ZM11.5 4.35L21 3V11.5H11.5V4.35ZM3 12.5H10.5V19.5L3 18.4V12.5ZM11.5 12.5H21V21L11.5 19.65V12.5Z"/></svg>'
              mac_icon   = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>'
              linux_icon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.686 2 6 5.02 6 8.5c0 1.8.6 3.4 1.6 4.6-.4.7-.6 1.4-.6 2.1 0 1.4.7 2.7 1.8 3.5-.3.4-.5.9-.5 1.4 0 1.3 1 2.4 2.4 2.4h2.6c1.4 0 2.4-1.1 2.4-2.4 0-.5-.2-1-.5-1.4 1.1-.8 1.8-2.1 1.8-3.5 0-.7-.2-1.4-.6-2.1C17.4 11.9 18 10.3 18 8.5 18 5.02 15.314 2 12 2z"/></svg>'

              # Pick one card to tag as "Recommended" based on the detected OS.
              # Arch isn't reliably in the User-Agent; for Linux we prefer slim
              # (smaller download — anyone with a modern distro will have
              # python3 >= 3.9), and default to x64 since ARM desktops are rare.
              recommended_key = None
              if detected_os == 'windows' and 'windows' in download_urls:
                  recommended_key = 'windows'
              elif detected_os == 'mac':
                  for k in ('macos-arm64', 'macos-intel'):
                      if k in download_urls:
                          recommended_key = k
                          break
              elif detected_os == 'linux':
                  for k in ('linux-x64-slim', 'linux-arm64-slim', 'linux-x64', 'linux-arm64'):
                      if k in download_urls:
                          recommended_key = k
                          break

              dl_icon = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
              sz_icon = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
              rec_badge_html = '<span class="rec-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Recommended</span>'

              def render_simple_card(key, icon, label, desc):
                  size_str = format_size(packages.get(key, {}).get('size', 0))
                  is_rec = (key == recommended_key)
                  rec = rec_badge_html if is_rec else ''
                  cls = 'pkg-card recommended' if is_rec else 'pkg-card'
                  url = download_urls[key]
                  return (
                      f'<div class="{cls}">'
                      f'<div class="pkg-card-header">'
                      f'<div class="pkg-icon">{icon}</div>'
                      f'<div class="pkg-info">'
                      f'<div class="pkg-name">{label} {rec}</div>'
                      f'<div class="pkg-desc">{desc}</div>'
                      f'</div></div>'
                      f'<div class="pkg-meta">{sz_icon} {size_str}</div>'
                      f'<a href="{url}" class="download-btn">{dl_icon} Download</a>'
                      f'</div>'
                  )

              def render_linux_card(label, portable_key, slim_key):
                  is_rec = (portable_key == recommended_key or slim_key == recommended_key)
                  rec = rec_badge_html if is_rec else ''
                  cls = 'pkg-card recommended' if is_rec else 'pkg-card'
                  buttons = []
                  if portable_key and portable_key in download_urls:
                      size = format_size(packages.get(portable_key, {}).get('size', 0))
                      url = download_urls[portable_key]
                      buttons.append(
                          f'<a href="{url}" class="variant-btn variant-btn-portable">'
                          f'<span class="variant-btn-title">Portable</span>'
                          f'<span class="variant-btn-sub">Self-contained · {size}</span>'
                          f'</a>'
                      )
                  if slim_key and slim_key in download_urls:
                      size = format_size(packages.get(slim_key, {}).get('size', 0))
                      url = download_urls[slim_key]
                      buttons.append(
                          f'<a href="{url}" class="variant-btn variant-btn-slim">'
                          f'<span class="variant-btn-title">Slim</span>'
                          f'<span class="variant-btn-sub">Needs Python 3.9+ · {size}</span>'
                          f'</a>'
                      )
                  return (
                      f'<div class="{cls}">'
                      f'<div class="pkg-card-header">'
                      f'<div class="pkg-icon">{linux_icon}</div>'
                      f'<div class="pkg-info">'
                      f'<div class="pkg-name">{label} {rec}</div>'
                      f'<div class="pkg-desc">Choose a variant based on your system Python.</div>'
                      f'</div></div>'
                      f'<div class="variant-btn-row">{"".join(buttons)}</div>'
                      f'</div>'
                  )

              # Group cards by OS. Groups with no available packages are omitted.
              windows_cards = []
              if 'windows' in download_urls:
                  windows_cards.append(render_simple_card('windows', win_icon, 'Windows', 'Windows 10 / 11 (x64) — portable Python'))

              mac_cards = []
              if 'macos-arm64' in download_urls:
                  mac_cards.append(render_simple_card('macos-arm64', mac_icon, 'macOS — Apple Silicon', 'macOS 11+ — portable Python'))
              if 'macos-intel' in download_urls:
                  mac_cards.append(render_simple_card('macos-intel', mac_icon, 'macOS — Intel', 'macOS 10.12+ — portable Python'))

              linux_cards = []
              for portable_key, slim_key, arch_label in (
                  ('linux-x64',   'linux-x64-slim',   'Linux x64'),
                  ('linux-arm64', 'linux-arm64-slim', 'Linux ARM64'),
              ):
                  if portable_key in download_urls or slim_key in download_urls:
                      linux_cards.append(render_linux_card(arch_label, portable_key, slim_key))

              os_sections = []
              for group_title, group_cards in (
                  ('Windows', windows_cards),
                  ('macOS',   mac_cards),
                  ('Linux',   linux_cards),
              ):
                  if group_cards:
                      os_sections.append(
                          f'<section class="os-section">'
                          f'<h2 class="os-heading">{group_title}</h2>'
                          f'<div class="download-grid">{"".join(group_cards)}</div>'
                          f'</section>'
                      )

              if not os_sections:
                  os_sections.append('<div class="no-pkg"><strong>No packages available.</strong> No packages have been published yet. Please contact your IT administrator.</div>')

              return f'''<!DOCTYPE html>
              <html lang="en">
              <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Claude Code — Software Distribution</title>
              <style>
              *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}

              :root {{
                --brand:       #1A3F82;
                --brand-dark:  #122D61;
                --brand-light: #2B5BA8;
                --accent:      #0078D4;
                --accent-hover:#0063B1;
                --ok:          #107C10;
                --ok-bg:       #E8F5E8;
                --warn-bg:     #FFF4CE;
                --warn:        #7A4A00;
                --surface:     #F5F7FA;
                --border:      #DDE1E9;
                --text-primary:#1A1D23;
                --text-secondary:#5A6270;
                --text-muted:  #8B93A1;
                --white:       #FFFFFF;
                --shadow-sm:   0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
                --shadow-md:   0 4px 12px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
                --radius:      6px;
              }}

              html, body {{
                height: 100%;
                background: var(--surface);
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
                font-size: 14px;
                color: var(--text-primary);
                line-height: 1.5;
              }}

              .topbar {{
                background: var(--brand);
                height: 52px;
                display: flex;
                align-items: center;
                padding: 0 32px;
                gap: 12px;
                position: sticky;
                top: 0;
                z-index: 100;
                box-shadow: 0 2px 8px rgba(0,0,0,.25);
              }}
              .topbar-logo {{ display: flex; align-items: center; gap: 10px; text-decoration: none; }}
              .topbar-product {{ color: #fff; font-size: 15px; font-weight: 600; letter-spacing: .01em; }}
              .topbar-sep {{ width: 1px; height: 18px; background: rgba(255,255,255,.25); margin: 0 4px; }}
              .topbar-sub {{ color: rgba(255,255,255,.7); font-size: 13px; }}
              .topbar-spacer {{ flex: 1; }}
              .topbar-user {{ display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.9); font-size: 13px; }}
              .topbar-user svg {{ opacity: .7; }}
              .role-chip {{
                display: inline-flex; align-items: center;
                padding: 2px 8px; border-radius: 3px;
                font-size: 11px; font-weight: 600;
                letter-spacing: .03em; text-transform: uppercase;
              }}
              .role-chip.standard {{ background: rgba(255,255,255,.15); color: rgba(255,255,255,.85); }}
              .role-chip.admin    {{ background: #F0A500; color: #1A1D23; text-decoration: none; }}
              .role-chip.admin:hover {{ background: #D4920A; }}

              .page {{ max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }}

              .page-header {{
                margin-bottom: 28px; padding-bottom: 20px;
                border-bottom: 1px solid var(--border);
              }}
              .page-header h1 {{ font-size: 22px; font-weight: 700; letter-spacing: -.01em; }}
              .page-header p {{ margin-top: 4px; color: var(--text-secondary); font-size: 13px; }}

              .meta-row {{ display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }}
              .meta-item {{ display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-secondary); }}
              .meta-item strong {{ color: var(--text-primary); font-weight: 600; }}
              .meta-dot {{ width: 4px; height: 4px; border-radius: 50%; background: var(--border); }}

              .section-heading {{
                font-size: 13px; font-weight: 700; color: var(--text-secondary);
                text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px;
              }}

              .os-section {{ margin-bottom: 28px; }}
              .os-section + .os-section {{ margin-top: 4px; }}
              .os-heading {{
                font-size: 12px; font-weight: 700; color: var(--text-secondary);
                text-transform: uppercase; letter-spacing: .08em;
                margin-bottom: 10px;
                display: flex; align-items: center; gap: 8px;
              }}
              .os-heading::after {{
                content: ''; flex: 1; height: 1px; background: var(--border);
              }}
              .download-grid {{
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 12px;
              }}
              .variant-btn-row {{
                display: flex; gap: 8px; margin-top: 4px;
              }}
              .variant-btn {{
                flex: 1; display: flex; flex-direction: column; gap: 2px;
                padding: 10px 12px; border-radius: var(--radius);
                text-decoration: none; border: 1px solid transparent;
                transition: background .15s, border-color .15s, box-shadow .15s;
              }}
              .variant-btn-title {{ font-size: 13px; font-weight: 600; }}
              .variant-btn-sub {{ font-size: 11.5px; opacity: .85; }}
              .variant-btn-portable {{
                background: var(--accent); color: var(--white);
                box-shadow: 0 1px 3px rgba(0,120,212,.3);
              }}
              .variant-btn-portable:hover {{ background: var(--accent-hover); }}
              .variant-btn-slim {{
                background: var(--white); color: var(--brand);
                border-color: var(--brand-light);
              }}
              .variant-btn-slim:hover {{
                background: rgba(26,63,130,.05); border-color: var(--brand);
              }}
              .pkg-card {{
                background: var(--white); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 20px;
                display: flex; flex-direction: column; gap: 12px;
                box-shadow: var(--shadow-sm);
                transition: border-color .15s, box-shadow .15s;
              }}
              .pkg-card:hover {{ border-color: var(--accent); box-shadow: var(--shadow-md); }}
              .pkg-card.recommended {{ border-color: var(--accent); border-width: 2px; }}
              .pkg-card-header {{ display: flex; align-items: flex-start; gap: 12px; }}
              .pkg-icon {{
                width: 36px; height: 36px; border-radius: 8px;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0; background: #EEF3FC; color: var(--brand-light);
              }}
              .pkg-info {{ flex: 1; min-width: 0; }}
              .pkg-name {{ font-size: 14px; font-weight: 600; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }}
              .pkg-desc {{ font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }}
              .pkg-meta {{ display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }}
              .rec-badge {{
                display: inline-flex; align-items: center; gap: 4px;
                padding: 2px 7px; background: var(--ok-bg); color: var(--ok);
                border-radius: 3px; font-size: 11px; font-weight: 600;
              }}
              .variant-pill {{
                display: inline-flex; align-items: center;
                padding: 1px 6px; border-radius: 3px;
                font-size: 10.5px; font-weight: 600; letter-spacing: .02em;
                text-transform: uppercase;
                background: rgba(26,63,130,.08); color: var(--brand);
              }}
              .variant-pill.variant-slim {{
                background: rgba(0,120,212,.1); color: var(--accent);
              }}
              .download-btn {{
                display: inline-flex; align-items: center; justify-content: center;
                gap: 6px; padding: 8px 18px;
                background: var(--accent); color: var(--white);
                text-decoration: none; border-radius: var(--radius);
                font-size: 13px; font-weight: 600;
                transition: background .15s, box-shadow .15s;
                box-shadow: 0 1px 3px rgba(0,120,212,.3);
                align-self: flex-start;
              }}
              .download-btn:hover {{ background: var(--accent-hover); box-shadow: 0 2px 8px rgba(0,120,212,.4); }}
              .no-pkg {{
                grid-column: 1/-1; padding: 32px;
                background: var(--warn-bg); border: 1px solid #F0C060;
                border-radius: var(--radius); color: var(--warn); font-size: 13px;
              }}

              .instructions-card {{
                background: var(--white); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm);
              }}
              .instructions-card h3 {{ font-size: 14px; font-weight: 700; margin-bottom: 16px; }}
              .step-list {{ list-style: none; display: flex; flex-direction: column; gap: 10px; }}
              .step-list li {{ display: flex; gap: 12px; font-size: 13px; color: var(--text-secondary); line-height: 1.5; }}
              .step-num {{
                flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
                background: var(--brand); color: var(--white);
                font-size: 11px; font-weight: 700;
                display: flex; align-items: center; justify-content: center; margin-top: 1px;
              }}
              .step-list code {{
                display: inline-block; padding: 1px 6px;
                background: #F0F2F5; border: 1px solid var(--border);
                border-radius: 3px; font-family: 'SFMono-Regular', Consolas, monospace;
                font-size: 12px; color: var(--brand);
              }}

              .page-footer {{
                margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
                display: flex; justify-content: space-between; align-items: center;
                flex-wrap: wrap; gap: 12px;
              }}
              .page-footer-left {{ color: var(--text-muted); font-size: 12px; }}
              .page-footer-right a {{ color: var(--accent); text-decoration: none; font-size: 12px; font-weight: 500; }}
              .page-footer-right a:hover {{ text-decoration: underline; }}
              </style>
              </head>
              <body>

              <nav class="topbar">
              <a class="topbar-logo" href="/">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <rect width="24" height="24" rx="4" fill="rgba(255,255,255,0.15)"/>
                  <path d="M7 8h10M7 12h7M7 16h5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span class="topbar-product">Claude Code Portal</span>
              </a>
              <div class="topbar-sep"></div>
              <span class="topbar-sub">Software Distribution</span>
              <div class="topbar-spacer"></div>
              <div class="topbar-user">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>{user_email}</span>
                {'<a id="user-role-badge" class="role-chip admin" href="/admin">Admin &#8599;</a>' if is_admin else ''}
                <a href="/logout" onclick="return confirm('Sign out of this portal?')" style="margin-left:8px;color:rgba(255,255,255,.6);font-size:12px;text-decoration:none;border:1px solid rgba(255,255,255,.25);padding:2px 8px;border-radius:3px" onmouseover="this.style.color='rgba(255,255,255,.9)'" onmouseout="this.style.color='rgba(255,255,255,.6)'">Sign Out</a>
              </div>
              </nav>

              <main class="page">
              <div class="page-header">
                <h1>Claude Code — Software Distribution</h1>
                <p>Select the appropriate package for your operating system and follow the installation steps below.</p>
              </div>

              <div class="meta-row">
                <div class="meta-item">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                  <span>Profile: <strong>{profile}</strong></span>
                </div>
                <div class="meta-dot"></div>
                <div class="meta-item">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <span>Released: <strong>{formatted_datetime}</strong></span>
                </div>
                <div class="meta-dot"></div>
                <div class="meta-item">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  <span>Build: <strong>{formatted_timestamp}</strong></span>
                </div>
              </div>

              <div class="section-heading">Available Packages</div>
              {"".join(os_sections)}

              <div class="instructions-card">
                <h3>Installation Guide</h3>
                <ol class="step-list">
                  <li><span class="step-num">1</span><span>Download the package for your operating system using the button above. The <strong>Slim</strong> Linux variants require system Python 3.9+; the <strong>Portable</strong> variants bundle their own Python.</span></li>
                  <li><span class="step-num">2</span><span><strong>Windows:</strong> Extract the ZIP archive, then double-click <code>install.bat</code>. No administrator rights needed — install target is your user profile.</span></li>
                  <li><span class="step-num">3</span><span><strong>Linux / macOS:</strong> Extract the archive and run <code>./install.sh</code> in your terminal.</span></li>
                  <li><span class="step-num">4</span><span>After installation, verify the setup by running <code>claude --version</code> in a new terminal session.</span></li>
                </ol>
              </div>

              <div class="instructions-card" style="margin-top:12px">
                <h3>Session &amp; Login Troubleshooting</h3>
                <ol class="step-list">
                  <li><span class="step-num">1</span><span><strong>Clear login cache (Linux / macOS):</strong> Run <code>~/claude-code-with-bedrock/credential-process --profile {aws_profile} --clear-cache</code> then restart Claude Code to re-authenticate.</span></li>
                  <li><span class="step-num">2</span><span><strong>Clear login cache (Windows):</strong> Run <code>%USERPROFILE%\claude-code-with-bedrock\credential-process.cmd --profile {aws_profile} --clear-cache</code> then restart Claude Code.</span></li>
                  <li><span class="step-num">3</span><span><strong>Portal session:</strong> Use the <strong>Sign Out</strong> button above to clear your browser session for this portal.</span></li>
                </ol>
              </div>

              <footer class="page-footer">
                <span class="page-footer-left">Claude Code Portal &middot; Internal Distribution System</span>
                <div class="page-footer-right" style="display:flex;gap:16px;align-items:center">
                  {'<a href="/admin">Admin Panel</a>' if is_admin else ''}
                  <a href="/logout" onclick="return confirm('Sign out of this portal?')" style="color:var(--text-secondary)">Sign Out</a>
                </div>
              </footer>
              </main>

              </body>
              </html>'''
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # ALB Security Group
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${IdentityPoolName}-landing-page-alb-sg'
      GroupDescription: Security group for distribution landing page ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from internet (authenticated access)
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Name
          Value: !Sub '${IdentityPoolName}-landing-page-alb-sg'

  # Application Load Balancer
  DistributionALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: ALBLogsBucketPolicy
    Properties:
      Name: !Sub '${IdentityPoolName}-dist-alb'
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref PublicSubnetIds
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: 'true'
        - Key: access_logs.s3.bucket
          Value: !Ref ALBLogsBucket
        - Key: access_logs.s3.prefix
          Value: 'alb'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Target Group for Lambda
  LambdaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn: LambdaInvokePermission
    Properties:
      Name: !Sub '${IdentityPoolName}-landing-page-tg'
      TargetType: lambda
      TargetGroupAttributes:
        - Key: lambda.multi_value_headers.enabled
          Value: 'true'
      Targets:
        - Id: !GetAtt LandingPageFunction.Arn
      HealthCheckEnabled: false
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # Lambda Invoke Permission for ALB
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LandingPageFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com
      SourceArn: !Sub 'arn:aws:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*'

  # ACM Certificate (required for HTTPS/OIDC)
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref CustomDomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref CustomDomainName
          HostedZoneId: !If [HasRoute53Zone, !Ref HostedZoneId, !Ref AWS::NoValue]
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # HTTPS Listener with OIDC Authentication (REQUIRED - uses custom domain)
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref DistributionALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        # OIDC Authentication Action
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/v2.0'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}'
                  - !Sub 'https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}'
            AuthorizationEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/authorize'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/oauth2/v2.0/authorize'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/authorize'
                  - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/authorize'
            TokenEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/token'
              - !If
                - IsAzure
                - !Sub 'https://login.microsoftonline.com/${AzureTenantId}/oauth2/v2.0/token'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/oauth/token'
                  - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token'
            UserInfoEndpoint: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}/oauth2/v1/userinfo'
              - !If
                - IsAzure
                - 'https://graph.microsoft.com/oidc/userinfo'
                - !If
                  - IsAuth0
                  - !Sub 'https://${Auth0Domain}/userinfo'
                  - !Sub 'https://${CognitoUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/userInfo'
            ClientId: !If
              - IsOkta
              - !Ref OktaClientId
              - !If
                - IsAzure
                - !Ref AzureClientId
                - !If
                  - IsAuth0
                  - !Ref Auth0ClientId
                  - !Ref CognitoClientId
            ClientSecret: !If
              - IsOkta
              - !Sub '{{resolve:secretsmanager:${OktaClientSecretArn}:SecretString}}'
              - !If
                - IsAzure
                - !Sub '{{resolve:secretsmanager:${AzureClientSecretArn}:SecretString}}'
                - !If
                  - IsAuth0
                  - !Sub '{{resolve:secretsmanager:${Auth0ClientSecretArn}:SecretString}}'
                  - !Sub '{{resolve:secretsmanager:${CognitoClientSecretArn}:SecretString}}'
            SessionTimeout: 43200  # 12 hours
            Scope: 'openid email profile'
            OnUnauthenticatedRequest: authenticate
        # Forward to Lambda
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref LambdaTargetGroup

  # Route53 A Record (if custom domain with Route53)
  DomainARecord:
    Type: AWS::Route53::RecordSet
    Condition: HasRoute53Zone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomainName
      Type: A
      AliasTarget:
        HostedZoneId: !GetAtt DistributionALB.CanonicalHostedZoneID
        DNSName: !GetAtt DistributionALB.DNSName
        EvaluateTargetHealth: false

  # Lambda function to update Cognito User Pool Client callback URLs
  CognitoCallbackUpdaterRole:
    Type: AWS::IAM::Role
    Condition: IsCognito
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: UpdateCognitoClient
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:UpdateUserPoolClient
                  - cognito-idp:DescribeUserPoolClient
                Resource:
                  - !Sub 'arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}'

  CognitoCallbackUpdaterFunction:
    Type: AWS::Lambda::Function
    Condition: IsCognito
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt CognitoCallbackUpdaterRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cognito = boto3.client('cognito-idp')

          def handler(event, context):
              logger.info(f"Event: {event}")

              try:
                  request_type = event['RequestType']

                  if request_type == 'Delete':
                      # On stack deletion, don't update callback URLs
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return

                  # Get parameters
                  user_pool_id = event['ResourceProperties']['UserPoolId']
                  client_id = event['ResourceProperties']['ClientId']
                  custom_domain = event['ResourceProperties']['CustomDomain']

                  # Build callback URLs
                  callback_url = f"https://{custom_domain}/oauth2/idpresponse"
                  logout_url = f"https://{custom_domain}/"

                  logger.info(f"Updating Cognito client {client_id} in pool {user_pool_id}")
                  logger.info(f"Callback URL: {callback_url}")
                  logger.info(f"Logout URL: {logout_url}")

                  # Get current client configuration
                  response = cognito.describe_user_pool_client(
                      UserPoolId=user_pool_id,
                      ClientId=client_id
                  )

                  current_client = response['UserPoolClient']

                  # Update callback URLs while preserving other settings
                  update_params = {
                      'UserPoolId': user_pool_id,
                      'ClientId': client_id,
                      'CallbackURLs': [callback_url],
                      'LogoutURLs': [logout_url]
                  }

                  # Preserve required OAuth settings
                  if 'AllowedOAuthFlows' in current_client:
                      update_params['AllowedOAuthFlows'] = current_client['AllowedOAuthFlows']
                  if 'AllowedOAuthScopes' in current_client:
                      update_params['AllowedOAuthScopes'] = current_client['AllowedOAuthScopes']
                  if 'AllowedOAuthFlowsUserPoolClient' in current_client:
                      update_params['AllowedOAuthFlowsUserPoolClient'] = current_client['AllowedOAuthFlowsUserPoolClient']

                  # Preserve or restore SupportedIdentityProviders
                  if 'SupportedIdentityProviders' in current_client and current_client['SupportedIdentityProviders']:
                      update_params['SupportedIdentityProviders'] = current_client['SupportedIdentityProviders']
                  else:
                      # If missing or null, default to COGNITO (should have been set by Cognito stack)
                      logger.warning("SupportedIdentityProviders is null, setting default to ['COGNITO']")
                      update_params['SupportedIdentityProviders'] = ['COGNITO']

                  cognito.update_user_pool_client(**update_params)

                  logger.info("Successfully updated Cognito client callback URLs")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'CallbackURL': callback_url,
                      'LogoutURL': logout_url
                  })

              except Exception as e:
                  logger.error(f"Error updating Cognito client: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {
                      'Error': str(e)
                  })

  UpdateCognitoCallbackURLs:
    Type: AWS::CloudFormation::CustomResource
    Condition: IsCognito
    DependsOn:
      - DistributionALB
      - HTTPSListener
    Properties:
      ServiceToken: !GetAtt CognitoCallbackUpdaterFunction.Arn
      UserPoolId: !Ref CognitoUserPoolId
      ClientId: !Ref CognitoClientId
      CustomDomain: !Ref CustomDomainName
      Version: !Ref DeploymentTimestamp  # Changes on every deployment to force Lambda re-execution

  # ============================================
  # Admin Panel Resources (conditional)
  # ============================================

  # Admin Lambda Execution Role
  AdminLambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: HasAdminPanel
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: AdminQuotaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Ref QuotaPoliciesTableArn
                  - !Sub '${QuotaPoliciesTableArn}/index/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Ref UserQuotaMetricsTableArn
              - !If
                - HasAdminPanel
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:DeleteItem
                    - dynamodb:Scan
                  Resource:
                    - !Ref BedrockPricingTableArn
                - !Ref 'AWS::NoValue'
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: AdminPanelLambda

  # Admin Lambda CloudWatch Log Group
  AdminPanelLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: HasAdminPanel
    Properties:
      LogGroupName: !Sub '/aws/lambda/${IdentityPoolName}-admin-panel'
      RetentionInDays: 30

  # Admin Panel Lambda Function
  AdminPanelFunction:
    Type: AWS::Lambda::Function
    Condition: HasAdminPanel
    DependsOn: AdminPanelLogGroup
    Properties:
      FunctionName: !Sub '${IdentityPoolName}-admin-panel'
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt AdminLambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          QUOTA_POLICIES_TABLE: !Ref QuotaPoliciesTableName
          USER_QUOTA_METRICS_TABLE: !Ref UserQuotaMetricsTableName
          ADMIN_EMAILS: !Ref AdminEmails
          ADMIN_GROUP_NAME: !Ref AdminGroupName
          PRICING_TABLE: !Ref BedrockPricingTableName
      Code: ./lambda-functions/landing_page_admin/
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock
        - Key: Purpose
          Value: AdminQuotaPanel

  # Admin Lambda Invoke Permission for ALB
  AdminLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: HasAdminPanel
    Properties:
      FunctionName: !Ref AdminPanelFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com
      SourceArn: !Sub 'arn:aws:elasticloadbalancing:${AWS::Region}:${AWS::AccountId}:targetgroup/*'

  # Admin Lambda Target Group
  AdminLambdaTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: HasAdminPanel
    DependsOn: AdminLambdaInvokePermission
    Properties:
      Name: !Sub '${IdentityPoolName}-admin-tg'
      TargetType: lambda
      TargetGroupAttributes:
        - Key: lambda.multi_value_headers.enabled
          Value: 'true'
      Targets:
        - Id: !GetAtt AdminPanelFunction.Arn
      HealthCheckEnabled: false
      Tags:
        - Key: Application
          Value: ClaudeCodeWithBedrock

  # ALB Listener Rule for /admin* paths
  AdminPathListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: HasAdminPanel
    Properties:
      ListenerArn: !Ref HTTPSListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - '/admin'
              - '/admin/*'
      Actions:
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !If
              - IsOkta
              - !Sub 'https://${OktaDomain}'
