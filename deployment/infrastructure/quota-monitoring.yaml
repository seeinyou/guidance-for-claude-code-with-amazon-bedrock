AWSTemplateFormatVersion: '2010-09-09'
Description: 'Claude Code quota monitoring stack for per-user token limits and alerts with fine-grained policy support'

Parameters:
  MonthlyTokenLimit:
    Type: Number
    Default: 10000000
    Description: Default monthly token limit per user (10M tokens) - used when no policy is defined
    MinValue: 1000000
    MaxValue: 1000000000

  MetricsTableArn:
    Type: String
    Description: ARN of the ClaudeCodeMetrics table from the dashboard stack

  WarningThreshold80:
    Type: Number
    Default: 8000000
    Description: Default warning threshold at 80% (8M tokens) - used when no policy is defined

  WarningThreshold90:
    Type: Number
    Default: 9000000
    Description: Default warning threshold at 90% (9M tokens) - used when no policy is defined

  DailyTokenLimit:
    Type: Number
    Default: 366667
    Description: Default daily token limit per user (monthly/30 * 1.1) - 0 to disable daily limits
    MinValue: 0
    MaxValue: 100000000

  DailyEnforcementMode:
    Type: String
    Default: 'alert'
    AllowedValues:
      - 'alert'
      - 'block'
    Description: Enforcement mode for daily limits - alert (warn only) or block (deny access)

  MonthlyEnforcementMode:
    Type: String
    Default: 'block'
    AllowedValues:
      - 'alert'
      - 'block'
    Description: Enforcement mode for monthly limits - alert (warn only) or block (deny access)

  MetricsAggregatorRoleName:
    Type: String
    Description: Name of the MetricsAggregatorRole from the dashboard stack

  EnableFinegrainedQuotas:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Enable fine-grained quota policies (user/group/default levels)

  # JWT Authentication Parameters for Quota Check API
  OidcIssuerUrl:
    Type: String
    Description: OIDC provider issuer URL for JWT validation (e.g., https://company.okta.com)

  OidcClientId:
    Type: String
    Description: OIDC client ID (audience) for JWT validation

  AlertEmail:
    Type: String
    Default: ''
    Description: Email address for quota and pipeline health alerts (leave empty to skip subscription)

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Resources:
  # DynamoDB table for quota policies (user, group, default levels)
  QuotaPolicies:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: QuotaPolicies
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: policy_type
          AttributeType: S
        - AttributeName: identifier
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: PolicyTypeIndex
          KeySchema:
            - AttributeName: policy_type
              KeyType: HASH
            - AttributeName: identifier
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Name
          Value: QuotaPolicies
        - Key: Purpose
          Value: Fine-grained quota policy definitions

  # DynamoDB table for user quota tracking
  UserQuotaMetrics:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: UserQuotaMetrics
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Name
          Value: UserQuotaMetrics
        - Key: Purpose
          Value: User quota monitoring and alerts

  # DynamoDB table for Bedrock model pricing (for cost-based quotas)
  BedrockPricing:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: BedrockPricing
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: model_id
          AttributeType: S
      KeySchema:
        - AttributeName: model_id
          KeyType: HASH
      Tags:
        - Key: Name
          Value: BedrockPricing
        - Key: Purpose
          Value: Model pricing data for cost-based quota enforcement

  # SNS Topic for quota alerts
  QuotaAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: claude-code-quota-alerts
      DisplayName: Claude Code Quota Alerts
      Tags:
        - Key: Name
          Value: ClaudeCodeQuotaAlerts
        - Key: Purpose
          Value: Quota monitoring notifications

  QuotaAlertSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref QuotaAlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # IAM Role for Quota Monitor Lambda
  QuotaMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuotaMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !Ref MetricsTableArn
                  - !GetAtt UserQuotaMetrics.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt QuotaPolicies.Arn
                  - !Sub '${QuotaPolicies.Arn}/index/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BedrockPricing.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref QuotaAlertTopic

  # Lambda function for quota monitoring
  QuotaMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-quota-monitor
      Description: Monitors user token usage and sends alerts when quotas are exceeded
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt QuotaMonitorRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          POLICIES_TABLE: !Ref QuotaPolicies
          SNS_TOPIC_ARN: !Ref QuotaAlertTopic
          MONTHLY_TOKEN_LIMIT: !Ref MonthlyTokenLimit
          WARNING_THRESHOLD_80: !Ref WarningThreshold80
          WARNING_THRESHOLD_90: !Ref WarningThreshold90
          DAILY_TOKEN_LIMIT: !Ref DailyTokenLimit
          DAILY_ENFORCEMENT_MODE: !Ref DailyEnforcementMode
          MONTHLY_ENFORCEMENT_MODE: !Ref MonthlyEnforcementMode
          ENABLE_FINEGRAINED_QUOTAS: !Ref EnableFinegrainedQuotas
          PRICING_TABLE: !Ref BedrockPricing
      Code: ./lambda-functions/quota_monitor/

  # EventBridge Rule to run quota monitor every 15 minutes
  QuotaMonitorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: claude-code-quota-monitor-schedule
      Description: Trigger quota monitoring every 15 minutes
      ScheduleExpression: rate(15 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt QuotaMonitorFunction.Arn
          Id: QuotaMonitorTarget

  # Permission for EventBridge to invoke the Lambda
  QuotaMonitorSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuotaMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt QuotaMonitorScheduleRule.Arn

  # ============================================
  # Quota Check API (Phase 2 - Access Blocking)
  # ============================================

  # IAM Role for Quota Check Lambda
  QuotaCheckRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: QuotaCheckPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt UserQuotaMetrics.Arn
                  - !GetAtt QuotaPolicies.Arn
                  - !Sub '${QuotaPolicies.Arn}/index/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BedrockPricing.Arn

  # Lambda function for real-time quota checking
  QuotaCheckFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-quota-check
      Description: Real-time quota check for credential issuance - blocks access when quota exceeded
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt QuotaCheckRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          POLICIES_TABLE: !Ref QuotaPolicies
          MONTHLY_TOKEN_LIMIT: !Ref MonthlyTokenLimit
          DAILY_TOKEN_LIMIT: !Ref DailyTokenLimit
          DAILY_ENFORCEMENT_MODE: !Ref DailyEnforcementMode
          MONTHLY_ENFORCEMENT_MODE: !Ref MonthlyEnforcementMode
          PRICING_TABLE: !Ref BedrockPricing
      Code: ./lambda-functions/quota_check/

  # HTTP API Gateway (v2 - cheaper and faster than REST API)
  QuotaCheckApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-quota-check-api'
      Description: Real-time quota check API for Claude Code credential provider (JWT authenticated)
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 300

  # JWT Authorizer for OIDC token validation
  QuotaCheckAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref QuotaCheckApi
      AuthorizerType: JWT
      Name: oidc-jwt-authorizer
      IdentitySource:
        - "$request.header.Authorization"
      JwtConfiguration:
        Issuer: !Ref OidcIssuerUrl
        Audience:
          - !Ref OidcClientId

  # Lambda integration for API Gateway
  QuotaCheckIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuotaCheckApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt QuotaCheckFunction.Arn
      PayloadFormatVersion: '2.0'

  # Route for GET /check (JWT authenticated)
  QuotaCheckRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuotaCheckApi
      RouteKey: 'GET /check'
      Target: !Sub 'integrations/${QuotaCheckIntegration}'
      AuthorizerId: !Ref QuotaCheckAuthorizer
      AuthorizationType: JWT

  # Default stage with auto-deploy
  QuotaCheckStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QuotaCheckApi
      StageName: '$default'
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50
        ThrottlingRateLimit: 20

  # Permission for API Gateway to invoke Lambda
  QuotaCheckLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref QuotaCheckFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuotaCheckApi}/*'

  # ============================================
  # End Quota Check API
  # ============================================

  # ============================================
  # Cost Management Hardening (TVM + Usage Pipeline)
  # ============================================

  # --- 1. BedrockUserRole (IAM Role for TVM-issued credentials) ---
  # --- 1. TVM Lambda + Role (defined BEFORE BedrockUserRole to avoid circular ref) ---
  TVMLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TVMLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt UserQuotaMetrics.Arn
                  - !GetAtt QuotaPolicies.Arn
                  - !Sub '${QuotaPolicies.Arn}/index/*'
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BedrockPricing.Arn

  BedrockUserRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockUserRole
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt TVMLambdaRole.Arn
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource: '*'

  # Separate policy to grant TVM Lambda sts:AssumeRole on BedrockUserRole
  # (avoids circular dependency between TVMLambdaRole and BedrockUserRole)
  TVMAssumeRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: TVMAssumeBedrockUserRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - sts:AssumeRole
            Resource:
              - !GetAtt BedrockUserRole.Arn
      Roles:
        - !Ref TVMLambdaRole

  TVMFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-tvm
      Description: Token Vending Machine - sole path to Bedrock credentials with quota enforcement
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt TVMLambdaRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          POLICIES_TABLE: !Ref QuotaPolicies
          PRICING_TABLE: !Ref BedrockPricing
          BEDROCK_USER_ROLE_ARN: !GetAtt BedrockUserRole.Arn
          TVM_SESSION_DURATION: '900'
          REQUIRE_OTEL_HELPER: 'false'
      Code: ./lambda-functions/tvm/

  # --- 3. TVM API Gateway Route (on existing QuotaCheckApi) ---
  TVMIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuotaCheckApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TVMFunction.Arn
      PayloadFormatVersion: '2.0'

  TVMRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuotaCheckApi
      RouteKey: 'POST /tvm'
      Target: !Sub 'integrations/${TVMIntegration}'
      AuthorizerId: !Ref QuotaCheckAuthorizer
      AuthorizationType: JWT

  TVMLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TVMFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuotaCheckApi}/*'

  # --- 4. Bedrock Logging Config Custom Resource ---
  BedrockLoggingConfigRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockLoggingConfigPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:GetModelInvocationLoggingConfiguration
                  - bedrock:PutModelInvocationLoggingConfiguration
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:HeadBucket
                Resource:
                  - !Sub 'arn:aws:s3:::bedrock-invocation-logs-${AWS::AccountId}-${AWS::Region}'
              # Notification config needed on whatever bucket Bedrock logging uses
              # (may be pre-existing with a different name)
              - Effect: Allow
                Action:
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                Resource: 'arn:aws:s3:::*'

  BedrockLoggingConfigFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-bedrock-logging-config
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BedrockLoggingConfigRole.Arn
      Timeout: 60
      MemorySize: 128
      Code: ./lambda-functions/bedrock_logging_config/

  # --- 5. SQS Queue + DLQ for Bedrock Usage Stream ---
  # NOTE: SQS resources defined BEFORE BedrockLoggingConfig so the Custom Resource
  # can configure S3 event notifications pointing to the queue
  BedrockLogDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: claude-code-bedrock-log-dlq
      MessageRetentionPeriod: 1209600  # 14 days

  BedrockLogQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: claude-code-bedrock-log-queue
      VisibilityTimeout: 300
      MessageRetentionPeriod: 86400  # 24 hours
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt BedrockLogDLQ.Arn
        maxReceiveCount: 3

  BedrockLogQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref BedrockLogQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt BedrockLogQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref 'AWS::AccountId'

  # Custom Resource to enable Bedrock logging + configure S3 -> SQS notification
  # Placed after SQS resources so the queue ARN is available
  BedrockLoggingConfig:
    Type: Custom::BedrockLoggingConfig
    DependsOn:
      - BedrockLogQueue
      - BedrockLogQueuePolicy
    Properties:
      ServiceToken: !GetAtt BedrockLoggingConfigFunction.Arn
      SQSQueueArn: !GetAtt BedrockLogQueue.Arn
      ForceUpdate: '2026-04-14-v2'

  # --- Shared Lambda Layer for Bedrock usage utilities ---
  BedrockUsageUtilsLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: ClaudeCode-BedrockUsageUtils
      Description: Shared utilities for Bedrock usage tracking (stream + reconciler)
      Content: ./lambda-functions/layer/
      CompatibleRuntimes:
        - python3.12
      LicenseInfo: MIT

  # --- 6. Bedrock Usage Stream Lambda ---
  BedrockUsageStreamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockUsageStreamPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub
                    - 'arn:aws:s3:::${Bucket}/*'
                    - Bucket: !GetAtt BedrockLoggingConfig.BucketName
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UserQuotaMetrics.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BedrockPricing.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt BedrockLogQueue.Arn

  BedrockUsageStreamFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-bedrock-usage-stream
      Description: Processes Bedrock invocation logs from S3 via SQS
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt BedrockUsageStreamRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          PRICING_TABLE: !Ref BedrockPricing
      Layers:
        - !Ref BedrockUsageUtilsLayer
      Code: ./lambda-functions/bedrock_usage_stream/

  BedrockUsageStreamEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt BedrockLogQueue.Arn
      FunctionName: !Ref BedrockUsageStreamFunction
      BatchSize: 100
      MaximumBatchingWindowInSeconds: 60
      FunctionResponseTypes:
        - ReportBatchItemFailures

  # --- 7. Bedrock Usage Reconciler Lambda ---
  BedrockUsageReconcilerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockUsageReconcilerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - 'arn:aws:s3:::${Bucket}'
                    - Bucket: !GetAtt BedrockLoggingConfig.BucketName
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub
                    - 'arn:aws:s3:::${Bucket}/*'
                    - Bucket: !GetAtt BedrockLoggingConfig.BucketName
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchGetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt UserQuotaMetrics.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt BedrockPricing.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt BedrockLogDLQ.Arn

  BedrockUsageReconcilerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: claude-code-bedrock-usage-reconciler
      Description: Periodic reconciler for missed Bedrock usage events
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt BedrockUsageReconcilerRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          QUOTA_TABLE: !Ref UserQuotaMetrics
          PRICING_TABLE: !Ref BedrockPricing
          DLQ_URL: !Ref BedrockLogDLQ
          BEDROCK_LOG_BUCKET: !GetAtt BedrockLoggingConfig.BucketName
          BEDROCK_LOG_PREFIX: 'bedrock-raw/'
          AWS_ACCOUNT_ID: !Ref 'AWS::AccountId'
      Layers:
        - !Ref BedrockUsageUtilsLayer
      Code: ./lambda-functions/bedrock_usage_reconciler/

  ReconcilerScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: claude-code-reconciler-schedule
      Description: Trigger Bedrock usage reconciler every 30 minutes
      ScheduleExpression: rate(30 minutes)
      State: ENABLED
      Targets:
        - Arn: !GetAtt BedrockUsageReconcilerFunction.Arn
          Id: ReconcilerTarget

  ReconcilerSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref BedrockUsageReconcilerFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ReconcilerScheduleRule.Arn

  # --- 8. CloudWatch Alarms ---
  StreamLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: claude-code-bedrock-stream-errors
      AlarmDescription: Bedrock usage stream Lambda has errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BedrockUsageStreamFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref QuotaAlertTopic

  ReconcilerLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: claude-code-reconciler-errors
      AlarmDescription: Bedrock usage reconciler Lambda has errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BedrockUsageReconcilerFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref QuotaAlertTopic

  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: claude-code-dynamodb-throttled
      AlarmDescription: DynamoDB throttled requests detected
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref UserQuotaMetrics
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref QuotaAlertTopic

  # ============================================
  # End Cost Management Hardening
  # ============================================

  # Grant MetricsAggregator permissions to write to quota table and read policies
  MetricsAggregatorQuotaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: MetricsAggregatorQuotaAccess
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:GetItem
            Resource:
              - !GetAtt UserQuotaMetrics.Arn
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:GetItem
            Resource:
              - !GetAtt QuotaPolicies.Arn
              - !Sub '${QuotaPolicies.Arn}/index/*'
          - Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:Scan
            Resource:
              - !GetAtt BedrockPricing.Arn
      Roles:
        - !Ref MetricsAggregatorRoleName

Outputs:
  QuotaTableName:
    Description: Name of the UserQuotaMetrics DynamoDB table
    Value: !Ref UserQuotaMetrics
    Export:
      Name: !Sub '${AWS::StackName}-QuotaTableName'

  QuotaTableArn:
    Description: ARN of the UserQuotaMetrics DynamoDB table
    Value: !GetAtt UserQuotaMetrics.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuotaTableArn'

  PoliciesTableName:
    Description: Name of the QuotaPolicies DynamoDB table for fine-grained quotas
    Value: !Ref QuotaPolicies
    Export:
      Name: !Sub '${AWS::StackName}-PoliciesTableName'

  PoliciesTableArn:
    Description: ARN of the QuotaPolicies DynamoDB table
    Value: !GetAtt QuotaPolicies.Arn
    Export:
      Name: !Sub '${AWS::StackName}-PoliciesTableArn'

  PricingTableName:
    Description: Name of the BedrockPricing DynamoDB table
    Value: !Ref BedrockPricing
    Export:
      Name: !Sub '${AWS::StackName}-PricingTableName'

  PricingTableArn:
    Description: ARN of the BedrockPricing DynamoDB table
    Value: !GetAtt BedrockPricing.Arn
    Export:
      Name: !Sub '${AWS::StackName}-PricingTableArn'

  QuotaAlertTopicArn:
    Description: SNS Topic ARN for quota alerts - subscribe to this for notifications
    Value: !Ref QuotaAlertTopic
    Export:
      Name: !Sub '${AWS::StackName}-QuotaAlertTopicArn'

  QuotaMonitorFunctionArn:
    Description: ARN of the quota monitoring Lambda function
    Value: !GetAtt QuotaMonitorFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuotaMonitorFunctionArn'

  QuotaCheckApiEndpoint:
    Description: HTTP API endpoint for real-time quota checks - configure in credential provider
    Value: !Sub 'https://${QuotaCheckApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-QuotaCheckApiEndpoint'

  QuotaCheckFunctionArn:
    Description: ARN of the quota check Lambda function
    Value: !GetAtt QuotaCheckFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-QuotaCheckFunctionArn'

  TVMFunctionArn:
    Description: ARN of the TVM Lambda function
    Value: !GetAtt TVMFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TVMFunctionArn'

  TVMEndpoint:
    Description: TVM endpoint URL for credential-process config
    Value: !Sub 'https://${QuotaCheckApi}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-TVMEndpoint'

  BedrockUserRoleArn:
    Description: ARN of the BedrockUserRole for TVM credential issuance
    Value: !GetAtt BedrockUserRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BedrockUserRoleArn'
